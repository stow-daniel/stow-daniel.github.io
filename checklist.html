<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checklist App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 12px;
            padding: 10px 16px;
            font-size: 16px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding-left: 0;
            margin-top: 24px;
        }

        li {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        li.completed span {
            text-decoration: line-through;
            color: #777;
        }

        input[type="checkbox"] {
            transform: scale(1.25);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Checklist App</h1>

        <textarea id="itemInput" placeholder="Paste one item per line"></textarea>

        <br>

        <button onclick="generateChecklist()">Generate Checklist</button>
        <button onclick="clearChecklist()">Clear Checklist</button>

        <ul id="checklist"></ul>
    </div>

    <script>
        function generateChecklist() {
            const input = document.getElementById("itemInput").value;
            const checklist = document.getElementById("checklist");

            checklist.innerHTML = "";

            const items = input
                .split("\n")
                .map(item => item.trim())
                .filter(item => item !== "");

            items.forEach(item => {
                const listItem = document.createElement("li");

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";

                const text = document.createElement("span");
                text.textContent = item;

                checkbox.addEventListener("change", function () {
                    listItem.classList.toggle("completed", checkbox.checked);
                });

                listItem.appendChild(checkbox);
                listItem.appendChild(text);

                checklist.appendChild(listItem);
            });
        }

        function clearChecklist() {
            document.getElementById("itemInput").value = "";
            document.getElementById("checklist").innerHTML = "";
        }
    </script>
</body>
</html>
